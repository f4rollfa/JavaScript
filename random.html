<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt arial;
            color: #ce1a1a;
            background-color: #158594;
        }
    </style>
</head>
<body>
    <script>
window.alert(`Olá, seja muito bem vindo!`);
let nome = window.prompt(`Qual é o seu nome?`);
window.alert(`Que bom te encontrar aqui ${nome}! Espero que goste do curso!`)
let idade = Number(window.prompt(`Qual é a sua idade?`))
let idademae = Number(window.prompt(`Qual é a idade da sua mãe?`))
if (idademae < 18)window.confirm(`Nossa! Sua mãe é muito jovem!`)
if (idademae > 18)window.confirm(`Nossa! Sua mãe é muito velha!`)
if (idademae == 18)window.confirm(`Nossa! Sua mãe tem exatamente 18 anos!`)
if (idade == idademae)window.confirm(`Nossa! Você tem a mesma idade que sua mãe!`)
if (idade > idademae)window.confirm(`Nossa! Você é mais velho que sua mãe!`)
if (idade < idademae)window.confirm(`Nossa! Você é mais novo que sua mãe!`)
    </script>

</body>
</html>
