<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: #158594; /*Comentário em css*/
            color: #fff;
            font: normal 20pt Arial  
        }
         h1 {
            color: #a31010; 
         }
         p{
            color: #132c9c;

    </style>

<body>
    <h1>Olá, mundo!</h1> <!--Comentário em html-->
    <p>Já me livrei da maldição!</p>
<script>
   var n1 = Number.parseFloat(window.prompt(`Digite um número:`)); //vai perguntar o número...
   var n2 = Number.parseFloat(window.prompt(`Digite outro número:`)); //vai perguntar outro número...
    var s = n1 + n2 //vai somar os números...
    window.alert(`A soma entre ${n1} e ${n2} é igual a ${String(s)}`); //vai mostrar a soma dos números...
</script>
